name: Carletto Buongiorno Bot

on:
  schedule:
    # 9:30 CET (UTC+1 winter) / 10:30 CEST (UTC+2 summer)
    - cron: "30 7 * * *" 
  workflow_dispatch: # manual trigger for testing

jobs:
  send-morning-email:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r apps/buongiorno-bot/requirements.txt

      - name: Write .env file
        working-directory: apps/buongiorno-bot
        run: |
          cat > .env << 'EOF'
          APP_ENV=production
          DRY_RUN=false
          STORAGE_BACKEND=google_workspace
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_USERNAME=${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
          SMTP_SENDER=${{ secrets.SMTP_SENDER }}
          GOOGLE_CREDENTIALS_FILE=service_account.json
          GOOGLE_CONTACTS_SPREADSHEET_ID=${{ secrets.GOOGLE_CONTACTS_SPREADSHEET_ID }}
          GOOGLE_CONTACTS_SHEET_NAME=users
          GOOGLE_CONTENT_SPREADSHEET_ID=${{ secrets.GOOGLE_CONTENT_SPREADSHEET_ID }}
          GOOGLE_QUOTES_SHEET_NAME=citazioni
          GOOGLE_SAINTS_SHEET_NAME=santi
          GOOGLE_BLASFEMIE_SHEET_NAME=blasfemie
          GOOGLE_PHOTOS_FOLDER_ID=${{ secrets.GOOGLE_PHOTOS_FOLDER_ID }}
          UNSUBSCRIBE_BASE_URL=${{ secrets.UNSUBSCRIBE_BASE_URL }}
          UNSUBSCRIBE_SECRET=${{ secrets.UNSUBSCRIBE_SECRET }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          LLM_PROMPT_FILE=apps/buongiorno-bot/data/prompts/system_prompt.txt
          EOF

      - name: Restore Service Account credentials
        run: echo "${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}" | base64 -d > service_account.json

      - name: Run bot
        working-directory: apps/buongiorno-bot
        run: PYTHONPATH=src python -m carlo_bot.main --send
